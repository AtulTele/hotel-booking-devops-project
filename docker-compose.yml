services:
  mongo:
    image: mongo:7
    container_name: hotel-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      APP_PORT: 5000
      APP_BASE_URL: http://localhost:5000
      MONGO_URI: mongodb://mongo:27017/hotel-booking
      NODE_ENV: production
    depends_on:
      - mongo
    networks:
      - hotel-net
    secrets:
      - jwt_secret_key
      - jwt_refresh_token_secret_key
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 0.50

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    restart: always
    ports:
      - "3034:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 0.50

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: hotel-admin
    restart: always
    ports:
      - "3033:80"
    depends_on:
      - backend
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.25

  nginx:
    image: nginx:alpine
    container_name: hotel-nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - admin-panel
      - backend
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    cpus: 0.25

volumes:
  mongo_data:

networks:
  hotel-net:
    driver: bridge

secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt

  jwt_refresh_token_secret_key:
    file: ./secrets/jwt_refresh_token_secret_key.txt
