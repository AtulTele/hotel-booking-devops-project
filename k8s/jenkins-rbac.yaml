apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-deployer
  namespace: jenkins

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer-role
  namespace: hotel-booking
rules:
- apiGroups: ["", "apps", "networking.k8s.io", "autoscaling"]
  resources:
  - pods
  - services
  - deployments
  - replicasets
  - configmaps
  - secrets
  - persistentvolumeclaims
  - ingresses
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-binding
  namespace: hotel-booking
subjects:
- kind: ServiceAccount
  name: jenkins-deployer
  namespace: jenkins

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-deployer-role
